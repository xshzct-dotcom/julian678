<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>向天游的随笔</title>
  <meta name="description" content="旅行、摄影与诗歌的随笔记录">
  
  <!-- Preconnect for faster loading -->
  <link rel="preconnect" href="https://raw.githubusercontent.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  
  <!-- Fonts -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" as="style">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #faf9f6;
      --text: #2c2c2c;
      --text-light: #666;
      --accent: #8b7355;
      --border: #e8e4df;
      --font-serif: 'Playfair Display', 'Noto Serif SC', serif;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    
    body {
      font-family: var(--font-serif);
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
    }
    
    /* Header */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(250, 249, 246, 0.95);
      backdrop-filter: blur(10px);
      z-index: 1000;
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    
    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 0.02em;
    }
    
    nav a {
      margin-left: 2rem;
      color: var(--text-light);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s;
    }
    
    nav a:hover { color: var(--text); }
    
    /* Hero */
    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
                  url('https://raw.githubusercontent.com/xshzct-dotcom/julian678/main/images/hero_bg.jpg') center/cover;
      color: white;
      margin-top: 0;
    }
    
    .hero h1 {
      font-size: 4rem;
      font-weight: 700;
      margin-bottom: 1rem;
      letter-spacing: 0.05em;
    }
    
    .hero p {
      font-size: 1.2rem;
      font-style: italic;
      opacity: 0.9;
    }
    
    /* Main content */
    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 4rem 2rem;
    }
    
    /* Blog posts */
    .post {
      margin-bottom: 5rem;
      animation: fadeIn 0.6s ease;
    }
    
    .post-date {
      font-size: 0.85rem;
      color: var(--text-light);
      margin-bottom: 0.5rem;
      font-family: var(--font-sans);
    }
    
    .post-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 1rem;
      line-height: 1.3;
    }
    
    .post-title a {
      color: var(--text);
      text-decoration: none;
      transition: color 0.3s;
    }
    
    .post-title a:hover { color: var(--accent); }
    
    .post-excerpt {
      color: var(--text-light);
      margin-bottom: 1.5rem;
      font-size: 1.05rem;
    }
    
    .post-image {
      width: 100%;
      height: 400px;
      object-fit: cover;
      margin-bottom: 1.5rem;
      border-radius: 4px;
    }
    
    .read-more {
      display: inline-block;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
      border-bottom: 1px solid var(--accent);
      padding-bottom: 2px;
      transition: opacity 0.3s;
    }
    
    .read-more:hover { opacity: 0.7; }
    
    /* Album grid */
    .album-section {
      margin-top: 6rem;
      padding-top: 4rem;
      border-top: 1px solid var(--border);
    }
    
    .album-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
    }
    
    .album-card {
      position: relative;
      aspect-ratio: 4/3;
      overflow: hidden;
      cursor: pointer;
      border-radius: 4px;
    }
    
    .album-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    
    .album-card:hover img { transform: scale(1.05); }
    
    .album-card .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .album-card:hover .overlay { opacity: 1; }
    
    .album-card .title {
      color: white;
      font-size: 1.2rem;
      font-weight: 600;
    }
    
    /* Footer */
    footer {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-light);
      font-size: 0.9rem;
      border-top: 1px solid var(--border);
      margin-top: 6rem;
    }
    
    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .hero h1 { font-size: 2.5rem; }
      main { padding: 2rem 1.5rem; }
      .post-title { font-size: 1.5rem; }
      .album-grid { grid-template-columns: repeat(2, 1fr); }
    }
    
    @media (max-width: 480px) {
      .album-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header>
    <a href="#" class="logo">向天游的随笔</a>
    <nav>
      <a href="#posts">随笔</a>
      <a href="#albums">相册</a>
      <a href="#about">关于</a>
    </nav>
  </header>

  <div class="hero">
    <div>
      <h1>向天游的随笔</h1>
      <p>记录旅行、摄影与诗歌</p>
    </div>
  </div>

  <main id="posts">
    <!-- Sample blog post -->
    <article class="post">
      <div class="post-date">2026.6.20 · 旅行见闻</div>
      <h2 class="post-title">
        <a href="#">苏州回三水的高铁上</a>
      </h2>
      <img src="https://raw.githubusercontent.com/xshzct-dotcom/julian678/main/images/xinjiang/微信图片_20260625125511_26_6.jpg" 
           alt="苏州回三水" class="post-image" loading="lazy">
      <p class="post-excerpt">
        下午四点多，我坐在从苏州回三水的高铁上。车窗外是大片的绿色田野，阳光斜斜地照进来...
      </p>
      <a href="#" class="read-more">继续阅读 →</a>
    </article>

    <!-- More posts would go here -->
  </main>

  <!-- Albums section -->
  <main class="album-section" id="albums">
    <h2 style="font-size: 2rem; margin-bottom: 1rem;">旅行的意义</h2>
    <p style="color: var(--text-light); margin-bottom: 2rem;">记录路上的风景</p>
    
    <div class="album-grid" id="album-grid"></div>
  </main>

  <footer id="about">
    <p>向天游 · 2002.11 · 旅行者 · 摄影爱好者</p>
    <p style="margin-top: 1rem; font-size: 0.8rem;">© 2026 向天游的随笔</p>
  </footer>

  <script>
    // ALBUMS DATA
    const albums = [
      {
        id: 'xinjiang',
        title: '新疆',
        cover: 'https://raw.githubusercontent.com/xshzct-dotcom/julian678/main/images/xinjiang/微信图片_20260625125511_26_6.jpg',
        photos: [
          'https://raw.githubusercontent.com/xshzct-dotcom/julian678/main/images/xinjiang/微信图片_20260625125511_26_6.jpg',
          'https://raw.githubusercontent.com/xshzct-dotcom/julian678/main/images/xinjiang/IMG_20240928_001246_看图王.jpg',
          'https://raw.githubusercontent.com/xshzct-dotcom/julian678/main/images/xinjiang/IMG_20250804_020042_看图王.jpg'
        ]
      }
    ];

    // Render albums
    const albumGrid = document.getElementById('album-grid');
    albums.forEach(album => {
      const card = document.createElement('div');
      card.className = 'album-card';
      card.innerHTML = `
        <img src="${album.cover}" alt="${album.title}" loading="lazy">
        <div class="overlay">
          <div class="title">${album.title}</div>
        </div>
      `;
      card.onclick = () => alert('Opening album: ' + album.title);
      albumGrid.appendChild(card);
    });

    // Lazy loading enhancement
    if ('IntersectionObserver' in window) {
      const images = document.querySelectorAll('img[loading="lazy"]');
      const imageObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const img = entry.target;
            img.src = img.src;
            imageObserver.unobserve(img);
          }
        });
      });
      images.forEach(img => imageObserver.observe(img));
    }
  </script>

</body>
</html>
